name: CI

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Unity.Extensions.Owned.slnx

      - name: Build
        run: dotnet build Unity.Extensions.Owned.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Unity.Extensions.Owned.slnx --no-build --configuration Release --verbosity normal

  pack-and-publish:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Pack
        run: dotnet pack Unity.Extensions.Owned/Unity.Extensions.Owned.csproj --configuration Release -p:PackageVersion=${GITHUB_REF_NAME#v} --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
